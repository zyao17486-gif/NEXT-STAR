  <html lang="zh-CN">

      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Next Star｜发现下一位 NBA 球星</title>
      <meta name="description" content="通过篮球 DNA、13 维球风匹配和 AI 球探，发现值得关注的 2026 届 NBA 新秀。" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      <!-- Google tag (gtag.js) -->
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-CJ0BVDWF5H"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-CJ0BVDWF5H');

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      <!-- Lightweight visit trend counter — once per browser tab session -->
      <script async>
        try {
          const visitKey = 'next-star-visit-counted';
          if (!sessionStorage.getItem(visitKey)) {
            sessionStorage.setItem(visitKey, 'pending');
            fetch('/api/visitor', { method: 'POST', keepalive: true })
              .then((response) => {
                if (response.ok) sessionStorage.setItem(visitKey, '1');
                else sessionStorage.removeItem(visitKey);
              })
              .catch(() => sessionStorage.removeItem(visitKey));
          }
        } catch { /* storage may be unavailable in privacy modes */ }
      </script>
      
    </body>
